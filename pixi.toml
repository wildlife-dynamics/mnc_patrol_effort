[workspace]
platforms = ['linux-64', 'osx-arm64', 'osx-64', 'win-64']

name = "mnc_patrol_effort"
channels = [
    'https://repo.prefix.dev/ecoscope-workflows/',
    'https://repo.prefix.dev/ecoscope-workflows-custom/',
    'conda-forge',
    ]

[dependencies]
curl = "*"
rattler-build = "*"
yq = "*"
hatch = "*"
pip = "*"
hatch-vcs = "*"

[feature.compile.dependencies]
ecoscope-workflows-ext-mnc = "0.0.8.*"
ecoscope-workflows-ext-ste = "0.0.19.*"
ecoscope-workflows-ext-mep = "0.0.12.*"
ecoscope-workflows-core = "0.22.18.*"
ecoscope-workflows-ext-custom = "0.0.45.*"

[environments]
compile = { features = ["compile"], no-default-feature = true }
